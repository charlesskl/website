<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Page not found — Royal Regent Toys">
  <title>404 — Page Not Found | Royal Regent Toys</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Canonical -->
  <link rel="canonical" href="https://royalregentgroup.com/404.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:title" content="404 — Page Not Found | Royal Regent Toys">
  <meta property="og:description" content="The page you're looking for doesn't exist.">
  <meta property="og:url" content="https://royalregentgroup.com/404.html">
  <meta property="og:site_name" content="Royal Regent Toys">

  <!-- Preload critical fonts -->
  <link rel="preload" href="assets/fonts/clash-display-600.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/clash-display-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/satoshi-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/satoshi-700.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Shared Design System -->
  <link rel="stylesheet" href="assets/shared.css">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--gradient-hero);
      position: relative;
      overflow: hidden;
    }
    .error-page .hero-grid-pattern { position: absolute; inset: 0; }
    .error-page .aurora { z-index: 1; }
    .error-content {
      position: relative;
      z-index: 10;
      max-width: 600px;
      padding: var(--space-lg) var(--space-md);
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 700;
      color: var(--brand);
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.15;
      margin-bottom: -0.3em;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .error-desc {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .error-btn-primary {
      background: var(--brand);
      color: var(--white);
    }
    .error-btn-primary:hover {
      background: var(--brand-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124, 179, 66, 0.3);
    }
    .error-btn-secondary {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .error-btn-secondary:hover {
      border-color: var(--brand);
      color: var(--brand-dark);
      transform: translateY(-2px);
    }
    .error-logo {
      margin-bottom: 32px;
    }
    .error-logo img {
      height: 48px;
      width: auto;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>


<main class="error-page" id="main-content">
  <div class="hero-grid-pattern"></div>
  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>

  <div class="error-content">
    <div class="error-logo">
      <a href="/"><img src="assets/logo.webp" alt="Royal Regent Toys" width="200" height="40"></a>
    </div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found.</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="/contact.html" class="error-btn error-btn-secondary">
        Contact Us
      </a>
    </div>
  </div>
</main>

</body>
</html>
