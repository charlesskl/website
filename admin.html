<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Manage Jobs</title>
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    :root {
      --font-display: 'Clash Display', sans-serif;
      --font-body: 'Satoshi', -apple-system, sans-serif;
      --brand: #7cb342;
      --brand-dark: #558b2f;
      --white: #fff;
      --text: #1d1d1f;
      --text-muted: #86868b;
      --border: #e5e5ea;
      --surface-alt: #f5f5f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; cursor: auto !important; }
    a, button { cursor: pointer !important; }
    input, textarea, select { cursor: text !important; }
    .cursor-dot, .cursor-ring, .cursor-label { display: none !important; }
    body { font-family: var(--font-body); background: var(--surface-alt); color: var(--text); min-height: 100vh; padding: 40px 20px; }

    .admin-container { max-width: 800px; margin: 0 auto; background: var(--white); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
    .admin-header { padding: 24px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .admin-header h2 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0; }
    .admin-header-actions { display: flex; gap: 8px; align-items: center; }

    .admin-body { padding: 24px 28px; }
    .admin-footer { padding: 16px 28px; border-top: 1px solid var(--border); display: none; gap: 8px; justify-content: flex-end; }

    /* Job list */
    .admin-job-list { list-style: none; padding: 0; margin: 0; }
    .admin-job-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .admin-job-item:last-child { border-bottom: none; }
    .admin-job-info h4 { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
    .admin-job-info span { font-size: 13px; color: var(--text-muted); }
    .admin-job-actions { display: flex; gap: 6px; }
    .admin-job-actions button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .admin-job-actions .edit-btn:hover { border-color: var(--brand); color: var(--brand); }
    .admin-job-actions .delete-btn:hover { border-color: #c0392b; color: #c0392b; }

    /* Job form */
    .admin-form { display: none; }
    .admin-form.active { display: block; }
    .admin-form label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; margin-top: 16px; }
    .admin-form label:first-child { margin-top: 0; }
    .admin-form input, .admin-form textarea, .admin-form select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font-body); box-sizing: border-box; }
    .admin-form textarea { min-height: 80px; resize: vertical; }
    .admin-form .form-row { display: flex; gap: 12px; }
    .admin-form .form-row > div { flex: 1; }

    .btn-sm { padding: 8px 18px; font-size: 13px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .btn-sm.primary { background: var(--brand); color: var(--white); }
    .btn-sm.primary:hover { background: var(--brand-dark); }
    .btn-sm.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm.ghost:hover { border-color: var(--text-muted); }
    .btn-sm.export { background: #2c3e50; color: var(--white); }
    .btn-sm.export:hover { background: #1a252f; }

    .save-status { display: none; text-align: center; padding: 12px; font-size: 13px; border-radius: 8px; margin-bottom: 16px; }
    .back-link { display: inline-block; margin-bottom: 20px; color: var(--text-muted); text-decoration: none; font-size: 14px; }
    .back-link:hover { color: var(--text); }

    @media(max-width:768px) {
      .admin-container { border-radius: 12px; }
      .admin-form .form-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<a href="careers.html" class="back-link">&larr; Back to Careers</a>

<!-- Password gate -->
<div class="admin-container" id="authGate" style="padding:60px 28px;text-align:center;">
  <h2 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:20px;">Admin Access</h2>
  <p style="color:var(--text-muted);margin-bottom:16px;">Enter password to continue</p>
  <input type="password" id="pwdInput" placeholder="Password" style="padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:15px;width:240px;margin-right:8px;">
  <button class="btn-sm primary" id="pwdBtn">Unlock</button>
  <p id="pwdError" style="color:#c0392b;font-size:13px;margin-top:8px;display:none;">Incorrect password.</p>
</div>

<div class="admin-container" id="adminPanel" style="display:none;">
  <div class="admin-header">
    <h2 id="adminTitle">Manage Jobs</h2>
    <div class="admin-header-actions">
      <button class="btn-sm ghost" id="adminReset" style="display:none;font-size:11px;" title="Discard all local changes and reload from jobs.json">Reset</button>
      <button class="btn-sm export" id="adminExport">Export JSON</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="save-status" id="adminSaveStatus"></div>
    <!-- Job list view -->
    <div id="adminList">
      <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--text-muted);" id="adminCount"></span>
        <button class="btn-sm primary" id="adminAddBtn">+ Add Job</button>
      </div>
      <ul class="admin-job-list" id="adminJobList"></ul>
    </div>
    <!-- Job form view -->
    <div id="adminForm" class="admin-form">
      <label>Job Title</label>
      <input type="text" id="formTitle" placeholder="e.g. Mold Design Engineer">
      <div class="form-row">
        <div>
          <label>Department</label>
          <select id="formDept">
            <option value="Office">Office</option>
            <option value="Production">Production</option>
          </select>
        </div>
        <div>
          <label>Location</label>
          <select id="formLocation">
            <option value="Indonesia, Kendal">Indonesia, Kendal</option>
            <option value="Indonesia, Ngawi">Indonesia, Ngawi</option>
            <option value="Dongguan, China">Dongguan, China</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Type</label>
          <select id="formType">
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Contract">Contract</option>
          </select>
        </div>
        <div>
          <label>Arrangement</label>
          <select id="formArrangement">
            <option value="On-site">On-site</option>
            <option value="Remote">Remote</option>
            <option value="Hybrid">Hybrid</option>
            <option value="">Not specified</option>
          </select>
        </div>
      </div>
      <label>Description</label>
      <textarea id="formDesc" placeholder="Job description..."></textarea>
    </div>
  </div>
  <div class="admin-footer" id="adminFooter">
    <button class="btn-sm ghost" id="formCancel">Cancel</button>
    <button class="btn-sm primary" id="formSave">Save Job</button>
  </div>
</div>

<script>
(function() {
  // Password gate (SHA-256 hash so password isn't in plaintext)
  var PASS_HASH = '597c28c381ef1feee61f3e9677a628b4cbd41cfb2539c8938062e1df2a882d39';
  var authGate = document.getElementById('authGate');
  var adminPanel = document.getElementById('adminPanel');

  async function checkHash(input) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  document.getElementById('pwdBtn').addEventListener('click', tryUnlock);
  document.getElementById('pwdInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryUnlock();
  });

  function tryUnlock() {
    checkHash(document.getElementById('pwdInput').value).then(function(hash) {
      if (hash === PASS_HASH) {
        authGate.style.display = 'none';
        adminPanel.style.display = '';
        loadJobs();
      } else {
        document.getElementById('pwdError').style.display = '';
      }
    });
  }

  var jobs = [];
  var editingIndex = -1;
  var dirty = false;

  var JOBS_VERSION = '2';

  function loadJobs() {
    var isDirty = !!localStorage.getItem('jobs_dirty');
    var cachedVersion = localStorage.getItem('jobs_version');
    if (isDirty && cachedVersion === JOBS_VERSION) {
      var cached = localStorage.getItem('jobs_data');
      if (cached) {
        try {
          jobs = JSON.parse(cached);
          renderList();
          return;
        } catch(e) { /* fall through */ }
      }
    }
    fetch('jobs.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        jobs = data;
        localStorage.setItem('jobs_data', JSON.stringify(jobs));
        localStorage.setItem('jobs_version', JOBS_VERSION);
        localStorage.removeItem('jobs_dirty');
        renderList();
      })
      .catch(function() {
        var cached = localStorage.getItem('jobs_data');
        if (cached) {
          try { jobs = JSON.parse(cached); renderList(); return; } catch(e) {}
        }
        document.getElementById('adminJobList').innerHTML = '<li style="color:var(--text-muted);padding:20px 0;">Unable to load job listings.</li>';
      });
  }

  function saveJobsLocal() {
    localStorage.setItem('jobs_data', JSON.stringify(jobs));
    localStorage.setItem('jobs_dirty', '1');
  }

  function resetToServer() {
    localStorage.removeItem('jobs_data');
    localStorage.removeItem('jobs_dirty');
    dirty = false;
    loadJobs();
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function showStatus(msg, isError) {
    var el = document.getElementById('adminSaveStatus');
    el.textContent = msg;
    el.style.display = '';
    el.style.background = isError ? '#fdecea' : '#e8f5e9';
    el.style.color = isError ? '#c0392b' : '#2e7d32';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
  }

  function updateResetBtn() {
    document.getElementById('adminReset').style.display = dirty ? '' : 'none';
  }

  function renderList() {
    var adminList = document.getElementById('adminList');
    var adminForm = document.getElementById('adminForm');
    var adminFooter = document.getElementById('adminFooter');

    adminList.style.display = '';
    adminForm.classList.remove('active');
    adminFooter.style.display = 'none';
    document.getElementById('adminTitle').textContent = 'Manage Jobs';
    updateResetBtn();

    var list = document.getElementById('adminJobList');
    list.innerHTML = '';
    document.getElementById('adminCount').textContent = jobs.length + ' job' + (jobs.length !== 1 ? 's' : '');
    jobs.forEach(function(job, i) {
      var li = document.createElement('li');
      li.className = 'admin-job-item';
      li.innerHTML = '<div class="admin-job-info"><h4>' + escHtml(job.title) + '</h4><span>' + escHtml(job.department) + ' &middot; ' + escHtml(job.location) + '</span></div>' +
        '<div class="admin-job-actions"><button class="edit-btn" data-i="' + i + '">Edit</button><button class="delete-btn" data-i="' + i + '">Delete</button></div>';
      list.appendChild(li);
    });
    list.querySelectorAll('.edit-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { openForm(parseInt(btn.dataset.i)); });
    });
    list.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { deleteJob(parseInt(btn.dataset.i)); });
    });
  }

  function openForm(index) {
    editingIndex = index;
    document.getElementById('adminList').style.display = 'none';
    document.getElementById('adminForm').classList.add('active');
    document.getElementById('adminFooter').style.display = 'flex';
    document.getElementById('adminTitle').textContent = index === -1 ? 'Add New Job' : 'Edit Job';

    if (index >= 0) {
      var j = jobs[index];
      document.getElementById('formTitle').value = j.title;
      document.getElementById('formDept').value = j.department;
      document.getElementById('formLocation').value = j.location;
      document.getElementById('formType').value = j.type;
      document.getElementById('formArrangement').value = j.arrangement || '';
      document.getElementById('formDesc').value = j.description;
    } else {
      document.getElementById('formTitle').value = '';
      document.getElementById('formDept').value = 'Office';
      document.getElementById('formLocation').value = 'Indonesia, Kendal';
      document.getElementById('formType').value = 'Full-Time';
      document.getElementById('formArrangement').value = 'On-site';
      document.getElementById('formDesc').value = '';
    }
  }

  function deleteJob(index) {
    if (!confirm('Delete "' + jobs[index].title + '"?')) return;
    jobs.splice(index, 1);
    dirty = true;
    saveJobsLocal();
    updateResetBtn();
    renderList();
  }

  // Wire up buttons
  document.getElementById('adminAddBtn').addEventListener('click', function() { openForm(-1); });
  document.getElementById('formCancel').addEventListener('click', renderList);

  document.getElementById('formSave').addEventListener('click', function() {
    var title = document.getElementById('formTitle').value.trim();
    if (!title) { alert('Title is required.'); return; }

    var job = {
      id: title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, ''),
      title: title,
      department: document.getElementById('formDept').value,
      location: document.getElementById('formLocation').value.trim(),
      type: document.getElementById('formType').value,
      arrangement: document.getElementById('formArrangement').value,
      description: document.getElementById('formDesc').value.trim(),
      applyUrl: 'contact.html'
    };

    if (editingIndex >= 0) {
      job.id = jobs[editingIndex].id;
      jobs[editingIndex] = job;
    } else {
      jobs.push(job);
    }

    dirty = true;
    saveJobsLocal();
    showStatus('Job saved locally. Export JSON to deploy.');
    renderList();
  });

  document.getElementById('adminReset').addEventListener('click', function() {
    if (!confirm('Discard all local changes and reload jobs from the server?')) return;
    resetToServer();
    showStatus('Reset to server data');
  });

  document.getElementById('adminExport').addEventListener('click', function() {
    var blob = new Blob([JSON.stringify(jobs, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'jobs.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

})();
</script>
</body>
</html>
